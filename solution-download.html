<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solution Sheet | MegaPrep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="solution-download">
<div class="page-shell page-shell--solution">
  <header class="topbar topbar--dashboard">
    <div class="brand brand--dashboard">
      <div class="logo-mark logo-mark--3d" aria-hidden="true"><span>M</span></div>
      <div class="brand-copy brand-copy--stacked">
        <span class="brand-name">MegaPrep</span>
        <span class="brand-tag">Solution Sheet</span>
      </div>
    </div>
  </header>
  <main class="content-area solution-public-layout">
    <section class="solution-public-card">
      <div class="solution-public-card__head">
        <div>
          <p class="section-heading__eyebrow">Published Solution</p>
          <h1>Solution Sheet</h1>
        </div>
        <span class="status-pill is-live">Public</span>
      </div>
      <div id="solutionDownloadPage" class="solution-public-summary"></div>
      <div class="entity-actions solution-public-actions">
        <button id="downloadSolutionBtn" type="button" class="submit-button">Download PDF</button>
        <button id="openSolutionBtn" type="button" class="toolbar-button">Open Solution</button>
      </div>
      <iframe id="solutionPreviewFrame" class="solution-preview-frame" title="Solution preview"></iframe>
    </section>
  </main>
</div>
<div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>
<script src="curriculum.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
